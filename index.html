<input 
    id="searchInput" 
    type="text" 
    placeholder="Search..."
    onkeydown="handleSearch(event)"
>

<script>
function handleSearch(event) {
    if (event.key === 'Enter') {
        const query = document.getElementById('searchInput').value.trim();
        if (query !== "") {
            window.location.href = "results.html?q=" + encodeURIComponent(query);
        }
    }
}
</script>
